openapi: "3.0.0"
info:
  title: Gopher Slayer API
  description: ワークショップ用ターン制バトルゲームAPI
  version: "1.0.0"

servers:
  - url: http://localhost:8080

paths:
  /api/hero:
    get:
      summary: ヒーローのステータスを取得する
      tags: [Hero]
      responses:
        "200":
          description: ヒーロー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hero"

  /api/hero/name:
    put:
      summary: ヒーローの名前を更新する（Lv2の参考実装）
      tags: [Hero]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "GoGopher"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/hero/experience:
    put:
      summary: ヒーローの経験値を更新する
      tags: [Hero]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                experience:
                  type: integer
                  example: 50
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/hero/hp:
    put:
      summary: ヒーローのHPを更新する（Lv3タスク）
      description: |
        Lv3のワークショップタスク: このエンドポイントはハンドラーが実装済みだが、
        バグ版ではルーティングが未登録のため404になる。
        main.go に `api.PUT("/hero/hp", heroHandler.UpdateHP)` を追加して修正する。
      tags: [Hero]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hp:
                  type: integer
                  example: 100
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/stages:
    get:
      summary: ステージ一覧を取得する（解放状況付き）
      tags: [Stage]
      responses:
        "200":
          description: ステージ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stage"

  /api/stages/{id}/enemies:
    get:
      summary: 指定ステージの敵一覧を取得する
      tags: [Stage]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 敵一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enemy"

  /api/stages/{id}/clear:
    post:
      summary: ステージをクリアして経験値を獲得する（Lv2タスク）
      description: |
        Lv2のワークショップタスク: バグ版ではこのエンドポイントが経験値をDBに保存しない。
        stage_service.go の ClearStage() に heroRepo.UpdateExperience() の呼び出しを追加して修正する。
      tags: [Stage]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: クリア成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClearStageResponse"

  /api/battle/attack:
    post:
      summary: ヒーローが敵を攻撃してダメージを計算する（Lv1タスク）
      description: |
        Lv1のワークショップタスク: バグ版では calculateDamage() が常に0を返す。
        battle_service.go の calculateDamage() を修正して正しいダメージを返すようにする。
        HPの管理はフロントエンド側で行う。
      tags: [Battle]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hero_attack:
                  type: integer
                  example: 15
      responses:
        "200":
          description: ダメージ計算結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttackResponse"

  /api/battle/enemy-attack:
    post:
      summary: 敵がヒーローを攻撃してダメージを計算する（Lv4タスク）
      description: |
        Lv4のワークショップタスク: バグ版では特定の敵がtime.Sleepで遅延し、
        かつダメージが負になりヒーローが回復してしまう。
        battle_service.go の EnemyAttack() のバグを見つけて修正する。
      tags: [Battle]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enemy_attack:
                  type: integer
                  example: 20
                enemy_name:
                  type: string
                  example: "Hell Hound"
      responses:
        "200":
          description: ダメージ計算結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttackResponse"

components:
  schemas:
    Hero:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Gopher"
        hp:
          type: integer
          example: 100
        max_hp:
          type: integer
          example: 100
        attack:
          type: integer
          example: 15
        level:
          type: integer
          example: 1
        experience:
          type: integer
          example: 0

    Stage:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Forest"
        description:
          type: string
          example: "A quiet forest, but beware of slimes!"
        required_experience:
          type: integer
          example: 0
        order_num:
          type: integer
          example: 1
        is_unlocked:
          type: boolean
          example: true

    Enemy:
      type: object
      properties:
        id:
          type: integer
          example: 1
        stage_id:
          type: integer
          example: 1
        name:
          type: string
          example: "Slime"
        hp:
          type: integer
          example: 30
        max_hp:
          type: integer
          example: 30
        attack:
          type: integer
          example: 5
        experience_reward:
          type: integer
          example: 10

    AttackResponse:
      type: object
      properties:
        damage:
          type: integer
          example: 14
        message:
          type: string
          example: "You dealt 14 damage!"

    ClearStageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Stage 'Forest' cleared!"
        experience_gained:
          type: integer
          example: 30
        new_experience:
          type: integer
          example: 30

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Updated successfully"
