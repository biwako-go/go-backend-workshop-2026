<svg viewBox="0 0 600 230" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow4b" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5a3e1b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="600" height="230" fill="#fffde8"/>

  <text x="300" y="25" text-anchor="middle" font-size="14" fill="#2a1a00">docker compose up -d を実行すると...</text>

  <!-- フロントエンド container -->
  <rect x="30" y="50" width="160" height="70" rx="6" fill="#ffffff" stroke="#5a3e1b" stroke-width="2"/>
  <text x="110" y="80" text-anchor="middle" font-size="14" fill="#2a1a00">フロントエンド</text>
  <text x="110" y="100" text-anchor="middle" font-size="14" fill="#2a1a00">コンテナ</text>

  <!-- バックエンド container -->
  <rect x="220" y="50" width="160" height="70" rx="6" fill="#ffffff" stroke="#5a3e1b" stroke-width="2"/>
  <text x="300" y="80" text-anchor="middle" font-size="14" fill="#2a1a00">バックエンド</text>
  <text x="300" y="100" text-anchor="middle" font-size="14" fill="#2a1a00">コンテナ</text>

  <!-- DB container -->
  <rect x="410" y="50" width="160" height="70" rx="6" fill="#ffffff" stroke="#5a3e1b" stroke-width="2"/>
  <text x="490" y="80" text-anchor="middle" font-size="14" fill="#2a1a00">DB</text>
  <text x="490" y="100" text-anchor="middle" font-size="14" fill="#2a1a00">コンテナ</text>

  <!-- connecting line -->
  <line x1="110" y1="170" x2="490" y2="170" stroke="#5a3e1b" stroke-width="2"/>
  <line x1="110" y1="170" x2="110" y2="128" stroke="#5a3e1b" stroke-width="2" marker-end="url(#arrow4b)"/>
  <line x1="300" y1="170" x2="300" y2="128" stroke="#5a3e1b" stroke-width="2" marker-end="url(#arrow4b)"/>
  <line x1="490" y1="170" x2="490" y2="128" stroke="#5a3e1b" stroke-width="2" marker-end="url(#arrow4b)"/>

  <text x="300" y="200" text-anchor="middle" font-size="14" fill="#7a5a2a" font-weight="bold">全部まとめて起動される</text>
</svg>
